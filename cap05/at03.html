<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Solicitação de Matrícula — Ativ. 3</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a8f3c, #ffffff);
      margin: 0;
    }

    main {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    fieldset {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    legend {
      font-weight: bold;
      color: #0a8f3c;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    /* Radios alinhados */
    .radio-group div {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .radio-group input {
      width: auto;
    }

    .radio-group label {
      display: inline;
      font-weight: normal;
      margin: 0;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #0a8f3c;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #087a32;
    }

  </style>
</head>

<body>

<main>
  <h1>Solicitação de Matrícula</h1>

  <form action="https://httpbin.org/post" method="post">

    <!-- ===================== -->
    <!-- DADOS PESSOAIS -->
    <!-- ===================== -->
    <fieldset>
      <legend>Dados Pessoais</legend>

      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">

      <label for="cpf">CPF</label>
      <input type="text" id="cpf" name="cpf" required 
             pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
             placeholder="000.000.000-00"
             title="CPF no formato 000.000.000-00">

      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone"
             pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
             placeholder="(82) 99999-9999">

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required>

    </fieldset>

    <!-- ===================== -->
    <!-- DADOS ACADÊMICOS -->
    <!-- ===================== -->
    <fieldset>
      <legend>Dados Acadêmicos</legend>

      <label for="curso">Curso</label>
      <select id="curso" name="curso" required>
        <optgroup label="Computação">
          <option value="si">Sistemas de Informação</option>
          <option value="cc">Ciência da Computação</option>
          <option value="ec">Engenharia da Computação</option>
        </optgroup>

        <optgroup label="Gestão">
          <option value="adm">Administração</option>
          <option value="cont">Ciências Contábeis</option>
        </optgroup>
      </select>

      <!-- Período -->
      <fieldset>
        <legend>Período</legend>

        <div class="radio-group">
          <div>
            <input type="radio" id="manha" name="periodo" value="manha" required>
            <label for="manha">Manhã</label>
          </div>

          <div>
            <input type="radio" id="tarde" name="periodo" value="tarde">
            <label for="tarde">Tarde</label>
          </div>

          <div>
            <input type="radio" id="noite" name="periodo" value="noite">
            <label for="noite">Noite</label>
          </div>
        </div>
      </fieldset>

      <label for="ano_ingresso">Ano de ingresso</label>
      <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required>

    </fieldset>

    <button type="submit">Enviar solicitação</button>

  </form>
</main>

</body>
</html>
