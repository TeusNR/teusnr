<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Inscrição — Semana de Tecnologia IFAL</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a8f3c, #ffffff);
      margin: 0;
    }

    main {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    fieldset {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    legend {
      font-weight: bold;
      color: #0a8f3c;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    input[type="range"],
    input[type="color"],
    input[type="file"] {
      width: 100%;
    }

    small {
      display: block;
      color: #555;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #0a8f3c;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #087a32;
    }

  </style>
</head>

<body>

<main>
  <h1>Semana de Tecnologia IFAL</h1>

  <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

    <!-- Campo oculto -->
    <input type="hidden" name="edicao" value="2026">

    <!-- ===================== -->
    <!-- IDENTIFICAÇÃO -->
    <!-- ===================== -->
    <fieldset>
      <legend>Identificação do participante</legend>

      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">E-mail institucional</label>
      <input type="email" id="email" name="email" required>

      <label for="cidade">Cidade de origem</label>
      <input list="cidades" id="cidade" name="cidade">

      <datalist id="cidades">
        <option value="Maceió">
        <option value="Arapiraca">
        <option value="Rio Largo">
        <option value="Palmeira dos Índios">
        <option value="Penedo">
        <option value="União dos Palmares">
        <option value="Delmiro Gouveia">
        <option value="São Miguel dos Campos">
      </datalist>

      <label for="foto">Foto para crachá</label>
      <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="foto-info">
      <small id="foto-info">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>

    </fieldset>

    <!-- ===================== -->
    <!-- PREFERÊNCIAS -->
    <!-- ===================== -->
    <fieldset>
      <legend>Preferências para o evento</legend>

      <label for="chegada">Data e hora de chegada</label>
      <input type="datetime-local" id="chegada" name="chegada">

      <label for="experiencia">
        Nível de experiência: <span id="valor-experiencia">5</span>/10
      </label>
      <input
        type="range"
        id="experiencia"
        name="experiencia"
        min="0" max="10" step="1" value="5"
        oninput="document.getElementById('valor-experiencia').textContent = this.value"
      >

      <label for="cor">Cor da camiseta</label>
      <input type="color" id="cor" name="cor_camiseta" value="#1a73e8">

      <label for="oficinas">Oficinas de interesse</label>
      <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="oficina-info">
        <option value="html">HTML e CSS</option>
        <option value="js">JavaScript</option>
        <option value="python">Python</option>
        <option value="bd">Banco de Dados</option>
        <option value="seguranca">Segurança da Informação</option>
      </select>
      <small id="oficina-info">
        Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.
      </small>

    </fieldset>

    <!-- BOTÃO -->
    <button type="submit">Confirmar inscrição</button>

  </form>
</main>

</body>
</html>
