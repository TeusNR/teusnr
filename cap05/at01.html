<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário de Contato — Ativ. 1</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a8f3c, #ffffff);
      margin: 0;
    }

    main {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: #0a8f3c;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #087a32;
    }

  </style>
</head>

<body>

<main>
  <h1>Formulário de Contato</h1>

  <form action="https://httpbin.org/get" method="get">

    <label for="nome">Nome completo</label>
    <input type="text" id="nome" name="nome">

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email">

    <label for="assunto">Assunto</label>
    <input type="text" id="assunto" name="assunto">

    <label for="mensagem">Mensagem</label>
    <textarea id="mensagem" name="mensagem" rows="5"></textarea>

    <button type="submit">Enviar mensagem</button>

  </form>
</main>

</body>
</html>
